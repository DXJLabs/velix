name: Build Starknet Privacy Prover Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      CARGO_TERM_COLOR: always
      CARGO_BUILD_JOBS: "2"
      PROVER_IMAGE: ghcr.io/dxjlabs/starknet-privacy-transaction-prover:privacy-0.14.3-rc.2-x86-64-v3

    steps:
      - name: Checkout official sequencer release
        uses: actions/checkout@v4
        with:
          repository: starkware-libs/sequencer
          ref: PRIVACY-0.14.3-RC.2
          path: sequencer
          fetch-depth: 1

      - name: Free disk space
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          docker system prune -af || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish x86-64-v3 transaction prover
        uses: docker/build-push-action@v6
        with:
          context: ./sequencer
          file: ./sequencer/crates/starknet_transaction_prover/Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          provenance: false
          sbom: false
          tags: ${{ env.PROVER_IMAGE }}
          labels: |
            org.opencontainers.image.source=https://github.com/DXJLabs/velix
            org.opencontainers.image.version=PRIVACY-0.14.3-RC.2
          build-args: |
            BUILD_MODE=release
            TARGET_CPU=x86-64-v3

      - name: Verify published image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "$PROVER_IMAGE"
          docker image inspect "$PROVER_IMAGE" >/dev/null
          echo "PROVER_IMAGE_PUBLISHED"
