name: Build Generic STWO Prover and Run Official SDK VEIL Proof

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-prove:
    name: Build Prover and Generate Official SDK VEIL Proof
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    env:
      CARGO_TERM_COLOR: always
      CARGO_BUILD_JOBS: "2"

    steps:
      # ============================================================
      # 1. CHECK HARDWARE
      # ============================================================

      - name: Check runner hardware
        shell: bash
        run: |
          echo "================================"
          echo "CPU"
          echo "================================"
          nproc

          lscpu | grep -E \
            "Architecture|CPU\(s\)|Model name|Thread|Core|Socket|Flags"

          echo
          echo "================================"
          echo "RAM"
          echo "================================"
          free -h

          echo
          echo "================================"
          echo "STORAGE"
          echo "================================"
          df -h /

      # ============================================================
      # 2. VALIDATE SECRETS, ADDRESS, RPC, AND FETCH NONCE
      # This runs before the prover build.
      # ============================================================

      - name: Validate VEIL inputs and fetch account nonce
        id: veil-inputs
        shell: bash
        env:
          RPC_URL: ${{ secrets.STARKNET_SEPOLIA_RPC_URL }}
          ACCOUNT_PRIVATE_KEY: ${{ secrets.VEIL_POC_ACCOUNT_PRIVATE_KEY }}
          USER_ADDRESS: ${{ secrets.VEIL_POC_ACCOUNT_ADDRESS }}
          CONFIGURED_BLOCK_ID: ${{ secrets.VEIL_POC_BLOCK_ID }}
          INDEXER_URL: ${{ secrets.VEIL_POC_INDEXER_URL }}
        run: |
          set -euo pipefail

          echo "================================"
          echo "VALIDATE VEIL INPUTS"
          echo "================================"

          if [ -z "${RPC_URL:-}" ]; then
            echo "Secret STARKNET_SEPOLIA_RPC_URL belum tersedia."
            exit 1
          fi

          if [ -z "${ACCOUNT_PRIVATE_KEY:-}" ]; then
            echo "Secret VEIL_POC_ACCOUNT_PRIVATE_KEY belum tersedia."
            exit 1
          fi

          if [ -z "${USER_ADDRESS:-}" ]; then
            echo "Secret VEIL_POC_ACCOUNT_ADDRESS belum tersedia."
            exit 1
          fi

          if [ -z "${INDEXER_URL:-}" ]; then
            echo "Secret VEIL_POC_INDEXER_URL belum tersedia."
            exit 1
          fi

          case "$USER_ADDRESS" in
            0x*)
              ;;
            *)
              echo "VEIL_POC_ACCOUNT_ADDRESS harus diawali 0x."
              exit 1
              ;;
          esac

          BLOCK_ID="${CONFIGURED_BLOCK_ID:-latest}"

          if [ "$BLOCK_ID" != "latest" ] && \
             ! [[ "$BLOCK_ID" =~ ^[0-9]+$ ]]; then
            echo "VEIL_POC_BLOCK_ID hanya boleh latest atau nomor block."
            exit 1
          fi

          echo "RPC secret tersedia."
          echo "Private key secret tersedia."
          echo "Account address tersedia."
          echo "Indexer URL tersedia."
          echo "Block ID tersedia."
          echo "Nilai rahasia tidak ditampilkan."

          echo
          echo "================================"
          echo "CHECK STARKNET CHAIN ID"
          echo "================================"

          CHAIN_RESPONSE="$(
            curl --fail-with-body -sS \
              --connect-timeout 10 \
              --max-time 30 \
              -X POST "$RPC_URL" \
              -H "Content-Type: application/json" \
              -d '{
                "jsonrpc": "2.0",
                "id": 1,
                "method": "starknet_chainId",
                "params": []
              }'
          )"

          echo "$CHAIN_RESPONSE" > veil-chain-id-response.json

          python3 - veil-chain-id-response.json <<'PY'
          import json
          import sys

          path = sys.argv[1]

          with open(path, "r", encoding="utf-8") as file:
              response = json.load(file)

          if response.get("error"):
              raise SystemExit(
                  "RPC chainId error: "
                  + json.dumps(response["error"], ensure_ascii=False)
              )

          chain_id = response.get("result")

          if not chain_id:
              raise SystemExit("RPC tidak mengembalikan chain ID")

          print("Chain ID:", chain_id)
          PY

          echo
          echo "================================"
          echo "FETCH CURRENT ACCOUNT NONCE"
          echo "================================"

          NONCE_PAYLOAD="$(
            python3 - "$USER_ADDRESS" "$BLOCK_ID" <<'PY'
          import json
          import sys

          account_address = sys.argv[1]
          block_id_input = sys.argv[2]

          if block_id_input == "latest":
              block_id = "latest"
          else:
              block_id = {
                  "block_number": int(block_id_input)
              }

          request = {
              "jsonrpc": "2.0",
              "id": 2,
              "method": "starknet_getNonce",
              "params": {
                  "block_id": block_id,
                  "contract_address": account_address,
              },
          }

          print(json.dumps(request))
          PY
          )"

          NONCE_RESPONSE="$(
            curl --fail-with-body -sS \
              --connect-timeout 10 \
              --max-time 30 \
              -X POST "$RPC_URL" \
              -H "Content-Type: application/json" \
              -d "$NONCE_PAYLOAD"
          )"

          echo "$NONCE_RESPONSE" > veil-nonce-response.json

          NONCE="$(
            python3 - veil-nonce-response.json <<'PY'
          import json
          import sys

          path = sys.argv[1]

          with open(path, "r", encoding="utf-8") as file:
              response = json.load(file)

          if response.get("error"):
              raise SystemExit(
                  "RPC getNonce error: "
                  + json.dumps(response["error"], ensure_ascii=False)
              )

          nonce = response.get("result")

          if nonce is None:
              raise SystemExit("RPC tidak mengembalikan nonce akun")

          print(nonce)
          PY
          )"

          echo "Account nonce berhasil diambil."

          echo "VEIL_POC_NONCE=$NONCE" >> "$GITHUB_ENV"
          echo "VEIL_POC_RESOLVED_BLOCK_ID=$BLOCK_ID" >> "$GITHUB_ENV"

          echo "nonce=$NONCE" >> "$GITHUB_OUTPUT"
          echo "block_id=$BLOCK_ID" >> "$GITHUB_OUTPUT"
          echo "result=INPUTS_VALID" >> "$GITHUB_OUTPUT"

      # ============================================================
      # 3. CHECKOUT VEIL SOURCE
      # ============================================================

      - name: Checkout VEIL source
        uses: actions/checkout@v4
        with:
          path: velix
          fetch-depth: 1

      - name: Show VEIL source commit
        shell: bash
        run: |
          set -euo pipefail

          cd velix

          echo "================================"
          echo "VEIL COMMIT"
          echo "================================"

          git rev-parse HEAD
          git log -1 --oneline

          echo
          echo "================================"
          echo "VEIL OFFICIAL SDK PROOF FILES"
          echo "================================"

          test -f tools/privacy-set-viewing-key-poc/Cargo.toml
          test -f tools/privacy-set-viewing-key-poc/src/main.rs
          test -f tools/privacy-set-viewing-key-poc/src/lib.rs
          test -f tools/privacy-prover-smoke-test.ts

          find tools/privacy-set-viewing-key-poc \
            -maxdepth 2 \
            -type f \
            -print

          echo "Rust PoC is retained as EXPERIMENTAL / NOT FOR PRODUCTION."

      # ============================================================
      # 4. PREPARE OFFICIAL PRIVACY SDK SMOKE TEST
      # ============================================================

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: velix/package-lock.json

      - name: Install pinned VEIL and official Privacy SDK dependencies
        shell: bash
        run: |
          set -euxo pipefail

          cd velix

          npm ci 2>&1 | tee ../veil-sdk-install.log

          npm --prefix packages/veil-sdk run build \
            2>&1 | tee ../veil-sdk-build.log

      # ============================================================
      # 5. CHECKOUT OFFICIAL STARKWARE SEQUENCER SOURCE
      # ============================================================

      - name: Checkout official sequencer release
        uses: actions/checkout@v4
        with:
          repository: starkware-libs/sequencer
          ref: PRIVACY-0.14.3-RC.2
          path: sequencer
          fetch-depth: 1

      - name: Show official prover source
        shell: bash
        run: |
          set -euo pipefail

          cd sequencer

          echo "================================"
          echo "OFFICIAL SEQUENCER COMMIT"
          echo "================================"

          git rev-parse HEAD

          echo
          echo "Tag:"

          git describe --tags --exact-match || true

          echo
          echo "Dockerfile:"

          test -f crates/starknet_transaction_prover/Dockerfile

          ls -lh \
            crates/starknet_transaction_prover/Dockerfile

      # ============================================================
      # 6. PREPARE DISK AND DOCKER
      # ============================================================

      - name: Free disk space and install utilities
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update -qq

          sudo apt-get install -y -qq \
            jq \
            time

          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true

          docker system prune -af || true

          echo "Storage after cleanup:"
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      # ============================================================
      # 7. BUILD GENERIC X86-64-V3 TRANSACTION PROVER
      # ============================================================

      - name: Build x86-64-v3 transaction prover
        shell: bash
        run: |
          set -euxo pipefail

          cd sequencer

          docker buildx build \
            --load \
            --progress=plain \
            --build-arg BUILD_MODE=release \
            --build-arg TARGET_CPU=x86-64-v3 \
            -f crates/starknet_transaction_prover/Dockerfile \
            -t veil-transaction-prover:x86-64-v3 \
            . 2>&1 | tee ../generic-build.log

      - name: Inspect generic prover image
        shell: bash
        run: |
          set -euo pipefail

          docker image inspect \
            veil-transaction-prover:x86-64-v3 \
            --format='Architecture={{.Architecture}}
          OS={{.Os}}
          Size={{.Size}}
          Entrypoint={{json .Config.Entrypoint}}
          Cmd={{json .Config.Cmd}}'

      # ============================================================
      # 8. START GENERIC PROVER WITH FULL DIAGNOSTICS
      # ============================================================

      - name: Start generic prover with Sepolia RPC
        id: startup
        shell: bash
        env:
          RPC_URL: ${{ secrets.STARKNET_SEPOLIA_RPC_URL }}
        run: |
          set -euo pipefail

          echo "result=STARTING" >> "$GITHUB_OUTPUT"
          echo "exit_status=1" >> "$GITHUB_OUTPUT"

          docker rm -f veil-generic-prover \
            2>/dev/null || true

          echo "================================"
          echo "START GENERIC PROVER"
          echo "================================"

          docker run -d \
            --name veil-generic-prover \
            -p 3000:3000 \
            -e RPC_URL="$RPC_URL" \
            -e CHAIN_ID="SN_SEPOLIA" \
            -e PROVER_IP="0.0.0.0" \
            -e PROVER_PORT="3000" \
            -e MAX_CONCURRENT_REQUESTS="1" \
            -e MAX_QUEUED_REQUESTS="1" \
            -e MAX_CONNECTIONS="2" \
            -e COMPILED_CLASS_CACHE_SIZE="50" \
            -e PREFETCH_STATE="false" \
            -e RUST_LOG="info" \
            -e RUST_BACKTRACE="1" \
            -e RUST_LIB_BACKTRACE="1" \
            veil-transaction-prover:x86-64-v3

          echo "Container berhasil dibuat."
          echo "Menunggu JSON-RPC prover siap..."

          READY=0

          for attempt in $(seq 1 60); do
            RUNNING="$(
              docker inspect \
                -f '{{.State.Running}}' \
                veil-generic-prover \
                2>/dev/null || true
            )"

            if [ "$RUNNING" != "true" ]; then
              echo "Container berhenti sebelum server siap."

              docker logs veil-generic-prover \
                2>&1 \
                | awk 'BEGIN { IGNORECASE = 1 } !/(private[_ -]?key|viewing[_ -]?key|signature|secret)/' \
                | tee generic-startup.log

              echo "result=CONTAINER_STOPPED" \
                >> "$GITHUB_OUTPUT"

              exit 1
            fi

            RESPONSE="$(
              curl -sS \
                --connect-timeout 2 \
                --max-time 5 \
                -X POST \
                http://127.0.0.1:3000 \
                -H "Content-Type: application/json" \
                -d '{
                  "jsonrpc": "2.0",
                  "id": 1,
                  "method": "starknet_specVersion",
                  "params": []
                }' \
                2>/dev/null || true
            )"

            if echo "$RESPONSE" | grep -q '"result"'; then
              echo
              echo "Prover siap pada percobaan $attempt."

              echo "$RESPONSE" \
                | tee spec-version-response.json

              READY=1
              break
            fi

            echo "Percobaan $attempt/60: belum siap."
            sleep 2
          done

          docker logs veil-generic-prover \
            2>&1 \
            | awk 'BEGIN { IGNORECASE = 1 } !/(private[_ -]?key|viewing[_ -]?key|signature|secret)/' \
            | tee generic-startup.log

          if [ "$READY" -ne 1 ]; then
            echo "Prover tidak siap dalam 120 detik."

            echo "result=SERVER_NOT_READY" \
              >> "$GITHUB_OUTPUT"

            exit 1
          fi

          echo "result=SERVER_READY" >> "$GITHUB_OUTPUT"
          echo "exit_status=0" >> "$GITHUB_OUTPUT"

      # ============================================================
      # 9. RUN REAL PROOF THROUGH THE OFFICIAL PRIVACY SDK
      # ============================================================

      - name: Run official SDK SetViewingKey real proof
        id: veil-proof
        shell: bash
        env:
          VEIL_POC_ACCOUNT_PRIVATE_KEY: ${{ secrets.VEIL_POC_ACCOUNT_PRIVATE_KEY }}
          VEIL_POC_ACCOUNT_ADDRESS: ${{ secrets.VEIL_POC_ACCOUNT_ADDRESS }}
          VEIL_POC_INDEXER_URL: ${{ secrets.VEIL_POC_INDEXER_URL }}
          VEIL_POC_RPC_URL: ${{ secrets.STARKNET_SEPOLIA_RPC_URL }}
          VEIL_POC_PROVER_URL: http://127.0.0.1:3000
          VEIL_POC_RESOLVED_BLOCK_ID: ${{ env.VEIL_POC_RESOLVED_BLOCK_ID }}
          VEIL_POC_SUMMARY_PATH: ${{ github.workspace }}/veil-proof-summary.json
        run: |
          set -euo pipefail

          echo "result=PROOF_STARTING" >> "$GITHUB_OUTPUT"
          echo "exit_status=1" >> "$GITHUB_OUTPUT"
          echo "duration_seconds=0" >> "$GITHUB_OUTPUT"

          if [ -z "${VEIL_POC_ACCOUNT_PRIVATE_KEY:-}" ]; then
            echo "VEIL_POC_ACCOUNT_PRIVATE_KEY kosong."
            echo "result=SECRET_MISSING" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -z "${VEIL_POC_ACCOUNT_ADDRESS:-}" ]; then
            echo "VEIL_POC_ACCOUNT_ADDRESS kosong."
            echo "result=ADDRESS_MISSING" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -z "${VEIL_POC_INDEXER_URL:-}" ]; then
            echo "VEIL_POC_INDEXER_URL kosong."
            echo "result=INDEXER_MISSING" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "================================"
          echo "OFFICIAL SDK REAL VEIL STWO PROOF"
          echo "================================"
          echo "User address tersedia."
          echo "Block ID tersedia."
          echo "Prover: localhost:3000"
          echo "Ready/custom signer: configured"
          echo "IndexerDiscoveryProvider: configured"
          echo "Private key, signature, viewing key, dan secret tidak ditampilkan."

          START_TIME="$(date +%s)"

          cd velix

          set +e

          timeout 300m \
            /usr/bin/time \
              -v \
              -o ../veil-proof-time.log \
            node --experimental-strip-types \
              tools/privacy-prover-smoke-test.ts \
            > ../veil-sdk-proof.log \
            2> ../veil-proof-stderr.log

          PROOF_STATUS=$?

          set -e

          END_TIME="$(date +%s)"
          DURATION="$((END_TIME - START_TIME))"

          echo "Proof process exit status: $PROOF_STATUS"
          echo "Proof duration: ${DURATION} seconds"

          echo
          echo "================================"
          echo "RESOURCE USAGE"
          echo "================================"

          cat ../veil-proof-time.log || true

          awk 'BEGIN { IGNORECASE = 1 } !/(private[_ -]?key|viewing[_ -]?key|signature|secret)/' \
            ../veil-proof-stderr.log \
            > ../veil-proof-stderr.sanitized.log
          mv ../veil-proof-stderr.sanitized.log \
            ../veil-proof-stderr.log

          if [ -s ../veil-proof-stderr.log ]; then
            echo
            echo "================================"
            echo "PROOF STDERR"
            echo "================================"

            tail -n 300 ../veil-proof-stderr.log
          fi

          echo "duration_seconds=$DURATION" \
            >> "$GITHUB_OUTPUT"

          echo "exit_status=$PROOF_STATUS" \
            >> "$GITHUB_OUTPUT"

          if [ "$PROOF_STATUS" -eq 124 ]; then
            echo
            echo "================================"
            echo "PROVER LOG AFTER TIMEOUT"
            echo "================================"

            docker logs --tail 500 veil-generic-prover \
              2>&1 \
              | awk 'BEGIN { IGNORECASE = 1 } !/(private[_ -]?key|viewing[_ -]?key|signature|secret)/' \
              | tee ../prover-failure.log || true

            echo "Proof melewati batas waktu 300 menit."
            echo "result=PROOF_TIMEOUT" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$PROOF_STATUS" -eq 137 ]; then
            echo
            echo "================================"
            echo "PROVER LOG AFTER OOM/KILL"
            echo "================================"

            docker logs --tail 500 veil-generic-prover \
              2>&1 \
              | awk 'BEGIN { IGNORECASE = 1 } !/(private[_ -]?key|viewing[_ -]?key|signature|secret)/' \
              | tee ../prover-failure.log || true

            echo "Proof dihentikan, kemungkinan kehabisan RAM."
            echo "result=PROOF_KILLED_OR_OOM" \
              >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$PROOF_STATUS" -ne 0 ]; then
            echo
            echo "================================"
            echo "PROVER LOG AFTER FAILED REQUEST"
            echo "================================"

            docker logs --tail 500 veil-generic-prover \
              2>&1 \
              | awk 'BEGIN { IGNORECASE = 1 } !/(private[_ -]?key|viewing[_ -]?key|signature|secret)/' \
              | tee ../prover-failure.log || true

            echo "Proof gagal dengan status $PROOF_STATUS."
            echo "result=PROOF_FAILED" >> "$GITHUB_OUTPUT"
            exit "$PROOF_STATUS"
          fi

          SUMMARY_FILE="$GITHUB_WORKSPACE/veil-proof-summary.json"

          if [ ! -s "$SUMMARY_FILE" ]; then
            echo "veil-proof-summary.json tidak dibuat atau kosong."
            echo "result=PROOF_ARTIFACT_MISSING" \
              >> "$GITHUB_OUTPUT"
            exit 1
          fi

          python3 - "$SUMMARY_FILE" <<'PY'
          import json
          import sys

          summary_path = sys.argv[1]
          with open(summary_path, "r", encoding="utf-8") as file:
              summary = json.load(file)

          if summary.get("result") != "OFFICIAL_SDK_REAL_PROOF_GENERATED":
              raise SystemExit("Official SDK tidak melaporkan real proof")
          if not summary.get("proofPresent"):
              raise SystemExit("Prover menghasilkan proof kosong")
          if summary.get("proofFactsCount", 0) < 1:
              raise SystemExit("Prover menghasilkan proof facts kosong")
          if summary.get("l2ToL1OutputCount", 0) < 1:
              raise SystemExit("Prover menghasilkan output kosong")

          print("================================")
          print("VEIL OFFICIAL SDK REAL PROOF VERDICT")
          print("================================")
          print("proof_present:", summary["proofPresent"])
          print("proof_length:", summary["proofLength"])
          print("proof_facts_count:", summary["proofFactsCount"])
          print("l2_to_l1_output_count:", summary["l2ToL1OutputCount"])
          PY

          echo
          cat "$SUMMARY_FILE"

          echo
          echo "result=OFFICIAL_SDK_REAL_PROOF_GENERATED" \
            >> "$GITHUB_OUTPUT"

          echo "exit_status=0" >> "$GITHUB_OUTPUT"

      # ============================================================
      # 10. FINAL VERDICT
      # ============================================================

      - name: Final verdict
        if: always()
        shell: bash
        run: |
          echo "================================"
          echo "FINAL VEIL PROVING RESULT"
          echo "================================"

          echo "Input validation:"
          echo "${{ steps.veil-inputs.outputs.result }}"

          echo
          echo "Resolved nonce:"
          echo "${{ steps.veil-inputs.outputs.nonce }}"

          echo
          echo "Resolved block:"
          echo "${{ steps.veil-inputs.outputs.block_id }}"

          echo
          echo "Prover server:"
          echo "${{ steps.startup.outputs.result }}"

          echo
          echo "Prover server exit:"
          echo "${{ steps.startup.outputs.exit_status }}"

          echo
          echo "VEIL proof:"
          echo "${{ steps.veil-proof.outputs.result }}"

          echo
          echo "VEIL proof exit:"
          echo "${{ steps.veil-proof.outputs.exit_status }}"

          echo
          echo "VEIL proof duration:"
          echo "${{ steps.veil-proof.outputs.duration_seconds }} seconds"

      # ============================================================
      # 11. SAVE LOGS AND STOP PROVER
      # ============================================================

      - name: Save prover logs and stop container
        if: always()
        shell: bash
        run: |
          echo "Saving final prover logs..."

          docker logs veil-generic-prover \
            2>&1 \
            | awk 'BEGIN { IGNORECASE = 1 } !/(private[_ -]?key|viewing[_ -]?key|signature|secret)/' \
            > generic-startup.log || true

          echo "Saving final Docker statistics..."

          docker stats \
            --no-stream \
            veil-generic-prover \
            > prover-docker-stats.txt \
            2>&1 || true

          echo "Saving final container state..."

          docker inspect veil-generic-prover \
            > prover-container-inspect.json \
            2>&1 || true

          echo "Stopping prover container..."

          docker rm -f \
            veil-generic-prover || true

      # ============================================================
      # 12. UPLOAD RESULTS
      # ============================================================

      - name: Upload prover and VEIL proof artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veil-official-sdk-stwo-real-proof-results
          path: |
            generic-build.log
            generic-startup.log
            prover-failure.log
            prover-docker-stats.txt
            prover-container-inspect.json
            spec-version-response.json
            veil-chain-id-response.json
            veil-nonce-response.json
            veil-sdk-install.log
            veil-sdk-build.log
            veil-sdk-proof.log
            veil-proof-time.log
            veil-proof-stderr.log
            veil-proof-summary.json
          if-no-files-found: ignore
          retention-days: 7
