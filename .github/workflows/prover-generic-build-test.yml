name: Build Generic STWO Prover

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test Generic Prover
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Check runner hardware
        shell: bash
        run: |
          echo "================================"
          echo "CPU"
          echo "================================"
          nproc
          lscpu | grep -E \
            "Architecture|CPU\(s\)|Model name|Thread|Core|Socket|Flags"

          echo
          echo "================================"
          echo "RAM"
          echo "================================"
          free -h

          echo
          echo "================================"
          echo "STORAGE"
          echo "================================"
          df -h /

      - name: Checkout official sequencer release
        uses: actions/checkout@v4
        with:
          repository: starkware-libs/sequencer
          ref: PRIVACY-0.14.3-RC.2
          path: sequencer
          fetch-depth: 1

      - name: Show official source commit
        shell: bash
        run: |
          cd sequencer

          echo "Commit:"
          git rev-parse HEAD

          echo
          echo "Tag:"
          git describe --tags --exact-match || true

          echo
          echo "Dockerfile:"
          test -f crates/starknet_transaction_prover/Dockerfile
          ls -lh crates/starknet_transaction_prover/Dockerfile

      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true

          docker system prune -af || true

          echo "Storage after cleanup:"
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build x86-64-v3 transaction prover
        shell: bash
        run: |
          set -euxo pipefail

          cd sequencer

          docker buildx build \
            --load \
            --progress=plain \
            --build-arg BUILD_MODE=release \
            --build-arg TARGET_CPU=x86-64-v3 \
            -f crates/starknet_transaction_prover/Dockerfile \
            -t veil-transaction-prover:x86-64-v3 \
            . 2>&1 | tee ../generic-build.log

      - name: Inspect generic image
        shell: bash
        run: |
          docker image inspect \
            veil-transaction-prover:x86-64-v3 \
            --format='Architecture={{.Architecture}}
          OS={{.Os}}
          Size={{.Size}}
          Entrypoint={{json .Config.Entrypoint}}
          Cmd={{json .Config.Cmd}}'

      - name: Start generic prover with Sepolia RPC
        id: startup
        shell: bash
        env:
          RPC_URL: ${{ secrets.STARKNET_SEPOLIA_RPC_URL }}
        run: |
          set +e

          echo "================================"
          echo "CHECKING RPC SECRET"
          echo "================================"

          if [ -z "${RPC_URL:-}" ]; then
            echo "Secret STARKNET_SEPOLIA_RPC_URL tidak ditemukan."
            echo "result=SECRET_MISSING" >> "$GITHUB_OUTPUT"
            echo "exit_status=1" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Secret RPC tersedia."
          echo "Nilai RPC disembunyikan oleh GitHub."

          docker rm -f veil-generic-prover 2>/dev/null || true

          echo
          echo "================================"
          echo "STARTING GENERIC PROVER"
          echo "================================"

          docker run -d \
            --name veil-generic-prover \
            -p 3000:3000 \
            -e RPC_URL="$RPC_URL" \
            -e CHAIN_ID="SN_SEPOLIA" \
            -e PROVER_IP="0.0.0.0" \
            -e PROVER_PORT="3000" \
            -e MAX_CONCURRENT_REQUESTS="1" \
            -e MAX_CONNECTIONS="2" \
            -e COMPILED_CLASS_CACHE_SIZE="50" \
            -e PREFETCH_STATE="false" \
            -e RUST_LOG="info" \
            veil-transaction-prover:x86-64-v3

          START_STATUS=$?

          if [ "$START_STATUS" -ne 0 ]; then
            echo "Container gagal dibuat."
            echo "result=CONTAINER_START_FAILED" >> "$GITHUB_OUTPUT"
            echo "exit_status=$START_STATUS" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Container berhasil dibuat."
          echo "Menunggu JSON-RPC prover siap..."

          READY=0

          for attempt in $(seq 1 30); do
            RUNNING="$(docker inspect \
              -f '{{.State.Running}}' \
              veil-generic-prover 2>/dev/null)"

            if [ "$RUNNING" != "true" ]; then
              echo "Container berhenti sebelum server siap."

              docker logs veil-generic-prover 2>&1 \
                | tee generic-startup.log

              echo "result=CONTAINER_STOPPED" >> "$GITHUB_OUTPUT"
              echo "exit_status=1" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            RESPONSE="$(curl -sS \
              --connect-timeout 2 \
              --max-time 5 \
              -X POST http://127.0.0.1:3000 \
              -H "Content-Type: application/json" \
              -d '{
                "jsonrpc": "2.0",
                "id": 1,
                "method": "starknet_specVersion",
                "params": []
              }' 2>/dev/null)"

            if echo "$RESPONSE" | grep -q '"result"'; then
              echo
              echo "Prover siap pada percobaan $attempt."

              echo "$RESPONSE" \
                | tee spec-version-response.json

              READY=1
              break
            fi

            echo "Percobaan $attempt/30: server belum siap."
            sleep 2
          done

          echo
          echo "================================"
          echo "GENERIC PROVER LOG"
          echo "================================"

          docker logs veil-generic-prover 2>&1 \
            | tee generic-startup.log

          if [ "$READY" -ne 1 ]; then
            echo
            echo "Prover tidak siap dalam waktu 60 detik."
            echo "result=SERVER_NOT_READY" >> "$GITHUB_OUTPUT"
            echo "exit_status=1" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo
          echo "result=SERVER_READY" >> "$GITHUB_OUTPUT"
          echo "exit_status=0" >> "$GITHUB_OUTPUT"

      - name: Final verdict
        if: always()
        shell: bash
        run: |
          echo "================================"
          echo "FINAL GENERIC PROVER RESULT"
          echo "================================"
          echo "Result: ${{ steps.startup.outputs.result }}"
          echo "Exit status: ${{ steps.startup.outputs.exit_status }}"

      - name: Stop generic prover
        if: always()
        shell: bash
        run: |
          echo "Saving final container logs..."

          docker logs veil-generic-prover \
            > generic-startup.log 2>&1 || true

          echo "Stopping container..."

          docker rm -f veil-generic-prover || true

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generic-stwo-prover-logs
          path: |
            generic-build.log
            generic-startup.log
            spec-version-response.json
          if-no-files-found: ignore
          retention-days: 7
